<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soniczinho - Game</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Reset básico */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(120deg, #1e1e2f, #3a3a5a);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #111;
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #00f;
  }

  header h1 {
    font-size: 1.8rem;
    color: #00f;
  }

  nav a {
    text-decoration: none;
    color: #fff;
    margin-left: 1rem;
    font-weight: bold;
    transition: color 0.3s;
  }

  nav a:hover {
    color: #00f;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  main h2 {
    margin-bottom: 1rem;
    font-size: 2rem;
    color: #0ff;
    text-shadow: 2px 2px #000;
  }

  iframe {
    width: 90%;
    max-width: 800px;
    height: 450px;
    border: 4px solid #0ff;
    border-radius: 10px;
    box-shadow: 0 0 20px #0ff;
  }

  @media (max-width: 600px) {
    iframe {
      height: 300px;
    }

    main h2 {
      font-size: 1.5rem;
    }
  }
</style>
</head>
<body>

<header>
  <h1>Jordan</h1>
  <nav>
    <a href="index.html">Home</a>
  </nav>
</header>

<main class="game-container">
  <h2>Soniczinho</h2>
  <iframe src="https://www.retrogames.cc/embed/42801-super-mario-bros-nes.html" allowfullscreen></iframe>
</main>

</body>
</html>
